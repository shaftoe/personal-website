name: Deploy

on:
  workflow_call:
    secrets:
      netlify-build-hook:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trigger Netlify Build
        id: netlify
        shell: bash
        run: |
          rc=$(curl -X POST -o /dev/null -s -w "%{http_code}" "${{ secrets.netlify-build-hook }}")
          echo "http_code=$rc" >> "$GITHUB_OUTPUT"
          echo "Netlify build triggered: $rc"

      - name: Verify Netlify Response
        if: steps.netlify.outputs.http_code != '200'
        run: |
          echo "::error::Netlify build hook returned HTTP ${{ steps.netlify.outputs.http_code }}"
          exit 1
